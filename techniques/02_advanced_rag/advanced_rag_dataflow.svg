<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1700 1460">
  <defs>
    <style>
      * { font-family: "Courier New", monospace; }
      .title { font-size: 36px; font-weight: 700; fill: #00d9ff; }
      .phase-title { font-size: 22px; font-weight: 700; fill: #00ffaa; }
      .stage-title { font-size: 17px; font-weight: 700; }
      .label { font-size: 15px; fill: #00ffaa; font-weight: 600; }
      .data-label { font-size: 12px; fill: #00d9ff; font-weight: 500; }
      .phase-label { font-size: 14px; fill: #0099ff; font-style: italic; }
      .description { font-size: 13px; fill: #00d9ff; opacity: 0.95; }
      .summary { font-size: 12px; fill: #aaffff; opacity: 0.9; }
      .note { font-size: 12px; fill: #aaffff; opacity: 0.85; }
    </style>
    <marker id="arrowhead-cyan" markerWidth="12" markerHeight="9" refX="11" refY="4.5" orient="auto">
      <polygon points="0 0, 12 4.5, 0 9" fill="#00ffaa" />
    </marker>
    <marker id="arrowhead-purple" markerWidth="12" markerHeight="9" refX="11" refY="4.5" orient="auto">
      <polygon points="0 0, 12 4.5, 0 9" fill="#ff00ff" />
    </marker>
    <marker id="arrowhead-green" markerWidth="12" markerHeight="9" refX="11" refY="4.5" orient="auto">
      <polygon points="0 0, 12 4.5, 0 9" fill="#00d9ff" />
    </marker>
    <marker id="arrowhead-stage" markerWidth="12" markerHeight="9" refX="11" refY="4.5" orient="auto">
      <polygon points="0 0, 12 4.5, 0 9" fill="#ffcc55" />
    </marker>
    <marker id="arrowhead-teal" markerWidth="12" markerHeight="9" refX="11" refY="4.5" orient="auto">
      <polygon points="0 0, 12 4.5, 0 9" fill="#00d9ff" />
    </marker>
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="2" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <pattern id="grid" width="20" height="20" patternUnits="userSpaceOnUse">
      <path d="M 20 0 L 0 0 0 20" fill="none" stroke="#0a2540" stroke-width="0.5"/>
    </pattern>
  </defs>
  <rect width="1700" height="1460" fill="#0a1628"/>
  <rect width="1700" height="1460" fill="url(#grid)"/>
  <text x="850" y="45" class="title" text-anchor="middle" filter="url(#glow)">Advanced RAG Data Flow Architecture</text>

  <rect x="30" y="70" width="1640" height="280" fill="none" stroke="#0099ff" stroke-width="2.5" stroke-dasharray="8,4" rx="12" opacity="0.6"/>
  <text x="55" y="108" class="phase-title">[OFFLINE PHASE]</text>
  <text x="55" y="132" class="phase-label">Indexing &amp; Vector Store Preparation (One-Time — Shared Across All Queries)</text>
  <rect x="55" y="148" width="1590" height="55" fill="none" stroke="#00ffaa" stroke-width="1.5" opacity="0.4" rx="6"/>
  <text x="70" y="168" class="summary" font-weight="600">📌 SUMMARY: Identical to Naive RAG — documents are chunked, embedded, and indexed into a</text>
  <text x="70" y="188" class="summary">vector store once. All of Advanced RAG's improvements happen in the ONLINE phase below.</text>
  <g filter="url(#glow)">
    <rect x="55" y="235" width="190" height="100" fill="none" stroke="#00d9ff" stroke-width="3" rx="10"/>
    <rect x="60" y="240" width="180" height="90" fill="none" stroke="#00ffaa" stroke-width="1.5" opacity="0.4" rx="8"/>
    <text x="150.0" y="269" class="label" text-anchor="middle" font-size="18">📄 Documents</text>
    <text x="150.0" y="293" class="data-label" text-anchor="middle">Raw Text</text>
  </g>
  <line x1="245" y1="285" x2="315" y2="285" stroke="#00ffaa" stroke-width="3.5" marker-end="url(#arrowhead-cyan)"/>
  <rect x="252.0" y="271" width="56" height="26" fill="#0a1628" opacity="0.95"/>
  <text x="280.0" y="290" class="data-label" text-anchor="middle" font-size="12" font-weight="600">Split</text>
  <g filter="url(#glow)">
    <rect x="315" y="235" width="190" height="100" fill="none" stroke="#00d9ff" stroke-width="3" rx="10"/>
    <rect x="320" y="240" width="180" height="90" fill="none" stroke="#ffaa00" stroke-width="1.5" opacity="0.4" rx="8"/>
    <text x="410.0" y="269" class="label" text-anchor="middle" font-size="18">✂️ Chunks</text>
    <text x="410.0" y="293" class="data-label" text-anchor="middle">512 tok, overlap=50</text>
  </g>
  <line x1="505" y1="285" x2="575" y2="285" stroke="#00ffaa" stroke-width="3.5" marker-end="url(#arrowhead-cyan)"/>
  <rect x="512.0" y="271" width="56" height="26" fill="#0a1628" opacity="0.95"/>
  <text x="540.0" y="290" class="data-label" text-anchor="middle" font-size="12" font-weight="600">Embed</text>
  <g filter="url(#glow)">
    <rect x="575" y="235" width="190" height="100" fill="none" stroke="#00d9ff" stroke-width="3" rx="10"/>
    <rect x="580" y="240" width="180" height="90" fill="none" stroke="#aa00ff" stroke-width="1.5" opacity="0.4" rx="8"/>
    <text x="670.0" y="269" class="label" text-anchor="middle" font-size="18">🧠 Embeddings</text>
    <text x="670.0" y="293" class="data-label" text-anchor="middle">nomic-embed-text</text>
  </g>
  <line x1="765" y1="285" x2="835" y2="285" stroke="#00ffaa" stroke-width="3.5" marker-end="url(#arrowhead-cyan)"/>
  <rect x="772.0" y="271" width="56" height="26" fill="#0a1628" opacity="0.95"/>
  <text x="800.0" y="290" class="data-label" text-anchor="middle" font-size="12" font-weight="600">Store</text>
  <g filter="url(#glow)">
    <rect x="835" y="235" width="190" height="100" fill="none" stroke="#00d9ff" stroke-width="3" rx="10"/>
    <rect x="840" y="240" width="180" height="90" fill="none" stroke="#00d9ff" stroke-width="1.5" opacity="0.4" rx="8"/>
    <text x="930.0" y="269" class="label" text-anchor="middle" font-size="18">💾 Vector Store</text>
    <text x="930.0" y="293" class="data-label" text-anchor="middle">ChromaDB</text>
  </g>
  <text x="1155" y="253" class="note" font-weight="600">💡 Runs once per document set, reused for unlimited queries below</text>
  <text x="55" y="418" class="phase-title">[ONLINE PHASE]</text>
  <text x="55" y="442" class="phase-label">Query Enhancement → Retrieval → Reranking → Generation (Per Query)</text>
  <rect x="55" y="458" width="1590" height="70" fill="none" stroke="#00ffaa" stroke-width="1.5" opacity="0.4" rx="6"/>
  <text x="70" y="480" class="summary" font-weight="600">📌 SUMMARY: Three optimization layers wrap the Naive RAG core — query rewriting +</text>
  <text x="70" y="496" class="summary">multi-query expansion (pre-retrieval), deduplicated multi-vector search (retrieval), and</text>
  <text x="70" y="512" class="summary">cross-encoder reranking + compression (post-retrieval) before the LLM ever sees context.</text>
  <rect x="30" y="370" width="1640" height="1050" fill="none" stroke="#0099ff" stroke-width="2.5" stroke-dasharray="8,4" rx="12" opacity="0.6"/>
  <rect x="50" y="550" width="1600" height="165" fill="none" stroke="#4ac0ff" stroke-width="2" stroke-dasharray="6,3" rx="10" opacity="0.7"/>
  <text x="70" y="574" class="stage-title" fill="#4ac0ff">① PRE-RETRIEVAL — Query Enhancement</text>
  <g filter="url(#glow)">
    <rect x="70" y="590" width="190" height="100" fill="none" stroke="#00d9ff" stroke-width="3" rx="10"/>
    <rect x="75" y="595" width="180" height="90" fill="none" stroke="#ff00ff" stroke-width="1.5" opacity="0.4" rx="8"/>
    <text x="165.0" y="624" class="label" text-anchor="middle" font-size="16">❓ Query</text>
    <text x="165.0" y="648" class="data-label" text-anchor="middle">User Input</text>
  </g>
  <line x1="260" y1="640" x2="340" y2="640" stroke="#00ffaa" stroke-width="3.5" marker-end="url(#arrowhead-cyan)"/>
  <rect x="264.0" y="626" width="72" height="26" fill="#0a1628" opacity="0.95"/>
  <text x="300.0" y="645" class="data-label" text-anchor="middle" font-size="12" font-weight="600">Rewrite</text>
  <g filter="url(#glow)">
    <rect x="340" y="590" width="190" height="100" fill="none" stroke="#00d9ff" stroke-width="3" rx="10"/>
    <rect x="345" y="595" width="180" height="90" fill="none" stroke="#ffaa00" stroke-width="1.5" opacity="0.4" rx="8"/>
    <text x="435.0" y="624" class="label" text-anchor="middle" font-size="16">✏️ Rewritten Query</text>
    <text x="435.0" y="648" class="data-label" text-anchor="middle">LLM rephrases for</text>
    <text x="435.0" y="672" class="data-label" text-anchor="middle">vocabulary match</text>
  </g>
  <line x1="530" y1="640" x2="610" y2="640" stroke="#00ffaa" stroke-width="3.5" marker-end="url(#arrowhead-cyan)"/>
  <rect x="538.0" y="626" width="64" height="26" fill="#0a1628" opacity="0.95"/>
  <text x="570.0" y="645" class="data-label" text-anchor="middle" font-size="12" font-weight="600">Expand</text>
  <g filter="url(#glow)">
    <rect x="610" y="590" width="190" height="100" fill="none" stroke="#00d9ff" stroke-width="3" rx="10"/>
    <rect x="615" y="595" width="180" height="90" fill="none" stroke="#aa00ff" stroke-width="1.5" opacity="0.4" rx="8"/>
    <text x="705.0" y="624" class="label" text-anchor="middle" font-size="16">🔀 Multi-Query</text>
    <text x="705.0" y="648" class="data-label" text-anchor="middle">3 variants,</text>
    <text x="705.0" y="672" class="data-label" text-anchor="middle">different angles</text>
  </g>
  <text x="860" y="628" class="note">💡 Bridges user vocabulary vs. document jargon</text>
  <text x="860" y="652" class="note">💡 Multi-query is a cheap way to boost recall</text>
  <rect x="50" y="755" width="1600" height="165" fill="none" stroke="#ffcc55" stroke-width="2" stroke-dasharray="6,3" rx="10" opacity="0.7"/>
  <text x="70" y="779" class="stage-title" fill="#ffcc55">② RETRIEVAL — Multi-Vector Search</text>
  <g filter="url(#glow)">
    <rect x="70" y="795" width="190" height="100" fill="none" stroke="#00d9ff" stroke-width="3" rx="10"/>
    <rect x="75" y="800" width="180" height="90" fill="none" stroke="#00d9ff" stroke-width="1.5" opacity="0.4" rx="8"/>
    <text x="165.0" y="829" class="label" text-anchor="middle" font-size="16">🔍 Vector Search</text>
    <text x="165.0" y="853" class="data-label" text-anchor="middle">kNN per variant,</text>
    <text x="165.0" y="877" class="data-label" text-anchor="middle">k=20 each</text>
  </g>
  <line x1="260" y1="845" x2="340" y2="845" stroke="#00ffaa" stroke-width="3.5" marker-end="url(#arrowhead-cyan)"/>
  <rect x="272.0" y="831" width="56" height="26" fill="#0a1628" opacity="0.95"/>
  <text x="300.0" y="850" class="data-label" text-anchor="middle" font-size="12" font-weight="600">Union</text>
  <g filter="url(#glow)">
    <rect x="340" y="795" width="190" height="100" fill="none" stroke="#00d9ff" stroke-width="3" rx="10"/>
    <rect x="345" y="800" width="180" height="90" fill="none" stroke="#ffaa00" stroke-width="1.5" opacity="0.4" rx="8"/>
    <text x="435.0" y="829" class="label" text-anchor="middle" font-size="16">📚 Raw Candidates</text>
    <text x="435.0" y="853" class="data-label" text-anchor="middle">~60 chunks</text>
    <text x="435.0" y="877" class="data-label" text-anchor="middle">(3 × 20, overlap)</text>
  </g>
  <line x1="530" y1="845" x2="610" y2="845" stroke="#00ffaa" stroke-width="3.5" marker-end="url(#arrowhead-cyan)"/>
  <rect x="538.0" y="831" width="64" height="26" fill="#0a1628" opacity="0.95"/>
  <text x="570.0" y="850" class="data-label" text-anchor="middle" font-size="12" font-weight="600">Dedupe</text>
  <g filter="url(#glow)">
    <rect x="610" y="795" width="190" height="100" fill="none" stroke="#00d9ff" stroke-width="3" rx="10"/>
    <rect x="615" y="800" width="180" height="90" fill="none" stroke="#00ffaa" stroke-width="1.5" opacity="0.4" rx="8"/>
    <text x="705.0" y="829" class="label" text-anchor="middle" font-size="16">🧹 Deduplicated</text>
    <text x="705.0" y="853" class="data-label" text-anchor="middle">Unique chunks by</text>
    <text x="705.0" y="877" class="data-label" text-anchor="middle">content hash</text>
  </g>
  <text x="860" y="833" class="note">💡 Each variant surfaces different relevant docs</text>
  <text x="860" y="857" class="note">💡 Dedup avoids feeding repeats to the reranker</text>
  <rect x="50" y="960" width="1600" height="165" fill="none" stroke="#00ffaa" stroke-width="2" stroke-dasharray="6,3" rx="10" opacity="0.7"/>
  <text x="70" y="984" class="stage-title" fill="#00ffaa">③ POST-RETRIEVAL — Rerank &amp; Compress</text>
  <g filter="url(#glow)">
    <rect x="70" y="1000" width="190" height="100" fill="none" stroke="#00d9ff" stroke-width="3" rx="10"/>
    <rect x="75" y="1005" width="180" height="90" fill="none" stroke="#ff00ff" stroke-width="1.5" opacity="0.4" rx="8"/>
    <text x="165.0" y="1034" class="label" text-anchor="middle" font-size="16">🎯 Cross-Encoder Rerank</text>
    <text x="165.0" y="1058" class="data-label" text-anchor="middle">ms-marco-MiniLM-L6</text>
    <text x="165.0" y="1082" class="data-label" text-anchor="middle">scores (query,doc) pairs</text>
  </g>
  <line x1="260" y1="1050" x2="340" y2="1050" stroke="#00ffaa" stroke-width="3.5" marker-end="url(#arrowhead-cyan)"/>
  <rect x="272.0" y="1036" width="56" height="26" fill="#0a1628" opacity="0.95"/>
  <text x="300.0" y="1055" class="data-label" text-anchor="middle" font-size="12" font-weight="600">Score</text>
  <g filter="url(#glow)">
    <rect x="340" y="1000" width="190" height="100" fill="none" stroke="#00d9ff" stroke-width="3" rx="10"/>
    <rect x="345" y="1005" width="180" height="90" fill="none" stroke="#aa00ff" stroke-width="1.5" opacity="0.4" rx="8"/>
    <text x="435.0" y="1034" class="label" text-anchor="middle" font-size="16">🗜️ Context Compression</text>
    <text x="435.0" y="1058" class="data-label" text-anchor="middle">LLM filters irrelevant</text>
    <text x="435.0" y="1082" class="data-label" text-anchor="middle">sentences (optional)</text>
  </g>
  <line x1="530" y1="1050" x2="610" y2="1050" stroke="#00ffaa" stroke-width="3.5" marker-end="url(#arrowhead-cyan)"/>
  <rect x="538.0" y="1036" width="64" height="26" fill="#0a1628" opacity="0.95"/>
  <text x="570.0" y="1055" class="data-label" text-anchor="middle" font-size="12" font-weight="600">Filter</text>
  <g filter="url(#glow)">
    <rect x="610" y="1000" width="190" height="100" fill="none" stroke="#00d9ff" stroke-width="3" rx="10"/>
    <rect x="615" y="1005" width="180" height="90" fill="none" stroke="#00d9ff" stroke-width="1.5" opacity="0.4" rx="8"/>
    <text x="705.0" y="1034" class="label" text-anchor="middle" font-size="16">📋 Final Context</text>
    <text x="705.0" y="1058" class="data-label" text-anchor="middle">Top-3 chunks,</text>
    <text x="705.0" y="1082" class="data-label" text-anchor="middle">highest precision</text>
  </g>
  <text x="860" y="1038" class="note">💡 Highest-ROI step: joint encoding beats bi-encoders</text>
  <text x="860" y="1062" class="note">💡 Adds ~200-500ms latency vs. Naive RAG</text>
  <rect x="50" y="1165" width="1600" height="165" fill="none" stroke="#ff66ff" stroke-width="2" stroke-dasharray="6,3" rx="10" opacity="0.7"/>
  <text x="70" y="1189" class="stage-title" fill="#ff66ff">④ GENERATION — Grounded Answer</text>
  <g filter="url(#glow)">
    <rect x="70" y="1205" width="190" height="100" fill="none" stroke="#00d9ff" stroke-width="3" rx="10"/>
    <rect x="75" y="1210" width="180" height="90" fill="none" stroke="#00ffaa" stroke-width="1.5" opacity="0.4" rx="8"/>
    <text x="165.0" y="1239" class="label" text-anchor="middle" font-size="16">📝 Prompt Template</text>
    <text x="165.0" y="1263" class="data-label" text-anchor="middle">Context + Question</text>
    <text x="165.0" y="1287" class="data-label" text-anchor="middle">system instructions</text>
  </g>
  <line x1="260" y1="1255" x2="340" y2="1255" stroke="#00ffaa" stroke-width="3.5" marker-end="url(#arrowhead-cyan)"/>
  <rect x="276.0" y="1241" width="48" height="26" fill="#0a1628" opacity="0.95"/>
  <text x="300.0" y="1260" class="data-label" text-anchor="middle" font-size="12" font-weight="600">Fill</text>
  <g filter="url(#glow)">
    <rect x="340" y="1205" width="190" height="100" fill="none" stroke="#00d9ff" stroke-width="3" rx="10"/>
    <rect x="345" y="1210" width="180" height="90" fill="none" stroke="#ffaa00" stroke-width="1.5" opacity="0.4" rx="8"/>
    <text x="435.0" y="1239" class="label" text-anchor="middle" font-size="16">🤖 LLM</text>
    <text x="435.0" y="1263" class="data-label" text-anchor="middle">LMStudio</text>
    <text x="435.0" y="1287" class="data-label" text-anchor="middle">generate w/ context</text>
  </g>
  <line x1="530" y1="1255" x2="610" y2="1255" stroke="#00ffaa" stroke-width="3.5" marker-end="url(#arrowhead-cyan)"/>
  <rect x="530.0" y="1241" width="80" height="26" fill="#0a1628" opacity="0.95"/>
  <text x="570.0" y="1260" class="data-label" text-anchor="middle" font-size="12" font-weight="600">Generate</text>
  <g filter="url(#glow)">
    <rect x="610" y="1205" width="190" height="100" fill="none" stroke="#00d9ff" stroke-width="3" rx="10"/>
    <rect x="615" y="1210" width="180" height="90" fill="none" stroke="#00ff00" stroke-width="1.5" opacity="0.4" rx="8"/>
    <text x="705.0" y="1239" class="label" text-anchor="middle" font-size="16">✅ Answer</text>
    <text x="705.0" y="1263" class="data-label" text-anchor="middle">Grounded response</text>
    <text x="705.0" y="1287" class="data-label" text-anchor="middle">+ source citations</text>
  </g>
  <text x="860" y="1243" class="note">💡 Answer must cite which context supports it</text>
  <text x="860" y="1267" class="note">💡 Falls back to "not in context" when ungrounded</text>
  <path d="M 705.0 690 Q 110 742.5 165.0 795" stroke="#ff00ff" stroke-width="3" fill="none" marker-end="url(#arrowhead-purple)" stroke-dasharray="7,5"/>
  <rect x="48.0" y="729.5" width="124" height="24" fill="#0a1628" opacity="0.95"/>
  <text x="110" y="747.5" class="data-label" text-anchor="middle" font-size="12" font-weight="600" fill="#ff00ff">3 variants →</text>
  <path d="M 705.0 895 Q 110 947.5 165.0 1000" stroke="#ff00ff" stroke-width="3" fill="none" marker-end="url(#arrowhead-purple)" stroke-dasharray="7,5"/>
  <rect x="48.0" y="934.5" width="124" height="24" fill="#0a1628" opacity="0.95"/>
  <text x="110" y="952.5" class="data-label" text-anchor="middle" font-size="12" font-weight="600" fill="#ff00ff">~60 → unique</text>
  <path d="M 705.0 1100 Q 110 1152.5 165.0 1205" stroke="#ff00ff" stroke-width="3" fill="none" marker-end="url(#arrowhead-purple)" stroke-dasharray="7,5"/>
  <rect x="52.5" y="1139.5" width="115" height="24" fill="#0a1628" opacity="0.95"/>
  <text x="110" y="1157.5" class="data-label" text-anchor="middle" font-size="12" font-weight="600" fill="#ff00ff">top-3 ready</text>
  <path d="M 930.0 335 Q 697.5 565.0 165.0 795" stroke="#00d9ff" stroke-width="3" fill="none" marker-end="url(#arrowhead-teal)" stroke-dasharray="7,5"/>
  <rect x="635.5" y="552.0" width="124" height="24" fill="#0a1628" opacity="0.95"/>
  <text x="697.5" y="570.0" class="data-label" text-anchor="middle" font-size="12" font-weight="600" fill="#00d9ff">reused index</text>
  <text x="55" y="1380" class="phase-title">[LEGEND]</text>
  <line x1="250" y1="1372" x2="295" y2="1372" stroke="#00ffaa" stroke-width="3.5" marker-end="url(#arrowhead-cyan)"/>
  <text x="310" y="1377" class="data-label" font-size="12" font-weight="600">Primary Data Flow (within stage)</text>
  <line x1="650" y1="1372" x2="695" y2="1372" stroke="#ff00ff" stroke-width="3" stroke-dasharray="7,5" marker-end="url(#arrowhead-purple)"/>
  <text x="710" y="1377" class="data-label" font-size="12" font-weight="600">Stage Transition</text>
  <line x1="990" y1="1372" x2="1035" y2="1372" stroke="#00d9ff" stroke-width="3" stroke-dasharray="7,5" marker-end="url(#arrowhead-teal)"/>
  <text x="1050" y="1377" class="data-label" font-size="12" font-weight="600">Reused Offline Index</text>
</svg>