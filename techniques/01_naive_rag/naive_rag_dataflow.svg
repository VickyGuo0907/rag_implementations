<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 900">
  <defs>
    <style>
      * { font-family: "Courier New", monospace; }
      .title { font-size: 36px; font-weight: 700; fill: #00d9ff; }
      .phase-title { font-size: 22px; font-weight: 700; fill: #00ffaa; }
      .label { font-size: 16px; fill: #00ffaa; font-weight: 600; }
      .data-label { font-size: 13px; fill: #00d9ff; font-weight: 500; }
      .phase-label { font-size: 14px; fill: #0099ff; font-style: italic; }
      .description { font-size: 13px; fill: #00d9ff; opacity: 0.95; }
      .summary { font-size: 12px; fill: #aaffff; opacity: 0.9; line-height: 1.6; }
    </style>
    <marker id="arrowhead-cyan" markerWidth="12" markerHeight="9" refX="11" refY="4.5" orient="auto">
      <polygon points="0 0, 12 4.5, 0 9" fill="#00ffaa" />
    </marker>
    <marker id="arrowhead-purple" markerWidth="12" markerHeight="9" refX="11" refY="4.5" orient="auto">
      <polygon points="0 0, 12 4.5, 0 9" fill="#ff00ff" />
    </marker>
    <marker id="arrowhead-green" markerWidth="12" markerHeight="9" refX="11" refY="4.5" orient="auto">
      <polygon points="0 0, 12 4.5, 0 9" fill="#00d9ff" />
    </marker>
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="2" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <pattern id="grid" width="20" height="20" patternUnits="userSpaceOnUse">
      <path d="M 20 0 L 0 0 0 20" fill="none" stroke="#0a2540" stroke-width="0.5"/>
    </pattern>
  </defs>
  <rect width="1600" height="900" fill="#0a1628"/>
  <rect width="1600" height="900" fill="url(#grid)"/>
  <text x="800" y="45" class="title" text-anchor="middle" filter="url(#glow)">Native RAG Data Flow Architecture</text>
  <rect x="30" y="70" width="740" height="760" fill="none" stroke="#0099ff" stroke-width="2.5" stroke-dasharray="8,4" rx="12" opacity="0.6"/>
  <text x="55" y="110" class="phase-title">[OFFLINE PHASE]</text>
  <text x="55" y="132" class="phase-label">Indexing &amp; Vector Store Preparation (One-Time)</text>
  <rect x="55" y="148" width="700" height="70" fill="none" stroke="#00ffaa" stroke-width="1.5" opacity="0.4" rx="6"/>
  <text x="70" y="170" class="summary" font-weight="600">📌 SUMMARY: Break documents into chunks, convert to embeddings,</text>
  <text x="70" y="186" class="summary">and store in vector database for fast similarity search retrieval.</text>
  <text x="70" y="202" class="summary">This happens once and is reused for all queries.</text>
  <g filter="url(#glow)">
    <rect x="55" y="240" width="160" height="100" fill="none" stroke="#00d9ff" stroke-width="3" rx="10"/>
    <rect x="60" y="245" width="150" height="90" fill="none" stroke="#00ffaa" stroke-width="1.5" opacity="0.4" rx="8"/>
    <text x="135" y="280" class="label" text-anchor="middle" font-size="18">📄 Documents</text>
    <text x="135" y="305" class="data-label" text-anchor="middle">Raw Text</text>
  </g>
  <line x1="215" y1="290" x2="270" y2="290" stroke="#00ffaa" stroke-width="3.5" marker-end="url(#arrowhead-cyan)"/>
  <rect x="230" y="276" width="40" height="28" fill="#0a1628" opacity="0.95"/>
  <text x="250" y="297" class="data-label" text-anchor="middle" font-size="12" font-weight="600">Split</text>
  <g filter="url(#glow)">
    <rect x="270" y="240" width="160" height="100" fill="none" stroke="#00d9ff" stroke-width="3" rx="10"/>
    <rect x="275" y="245" width="150" height="90" fill="none" stroke="#ffaa00" stroke-width="1.5" opacity="0.4" rx="8"/>
    <text x="350" y="275" class="label" text-anchor="middle" font-size="18">✂️ Chunks</text>
    <text x="350" y="300" class="data-label" text-anchor="middle">512 tokens</text>
    <text x="350" y="318" class="data-label" text-anchor="middle">overlap=50</text>
  </g>
  <line x1="430" y1="290" x2="485" y2="290" stroke="#00ffaa" stroke-width="3.5" marker-end="url(#arrowhead-cyan)"/>
  <rect x="445" y="276" width="40" height="28" fill="#0a1628" opacity="0.95"/>
  <text x="465" y="297" class="data-label" text-anchor="middle" font-size="12" font-weight="600">Embed</text>
  <g filter="url(#glow)">
    <rect x="485" y="240" width="160" height="100" fill="none" stroke="#00d9ff" stroke-width="3" rx="10"/>
    <rect x="490" y="245" width="150" height="90" fill="none" stroke="#aa00ff" stroke-width="1.5" opacity="0.4" rx="8"/>
    <text x="565" y="275" class="label" text-anchor="middle" font-size="18">🧠 Embeddings</text>
    <text x="565" y="300" class="data-label" text-anchor="middle">Vectors (384-dim)</text>
    <text x="565" y="318" class="data-label" text-anchor="middle">nomic-embed-text</text>
  </g>
  <line x1="645" y1="290" x2="700" y2="290" stroke="#00ffaa" stroke-width="3.5" marker-end="url(#arrowhead-cyan)"/>
  <rect x="660" y="276" width="40" height="28" fill="#0a1628" opacity="0.95"/>
  <text x="680" y="297" class="data-label" text-anchor="middle" font-size="12" font-weight="600">Store</text>
  <g filter="url(#glow)">
    <ellipse cx="780" cy="270" rx="80" ry="25" fill="none" stroke="#00d9ff" stroke-width="3"/>
    <ellipse cx="780" cy="270" rx="76" ry="21" fill="none" stroke="#00ffaa" stroke-width="1.5" opacity="0.3"/>
    <rect x="700" y="270" width="160" height="120" fill="none" stroke="#00d9ff" stroke-width="3"/>
    <line x1="705" y1="290" x2="855" y2="290" stroke="#00d9ff" stroke-width="1" opacity="0.3"/>
    <line x1="705" y1="320" x2="855" y2="320" stroke="#00d9ff" stroke-width="1" opacity="0.3"/>
    <line x1="705" y1="350" x2="855" y2="350" stroke="#00d9ff" stroke-width="1" opacity="0.3"/>
    <line x1="705" y1="375" x2="855" y2="375" stroke="#00d9ff" stroke-width="1" opacity="0.3"/>
    <ellipse cx="780" cy="390" rx="80" ry="25" fill="none" stroke="#00d9ff" stroke-width="3"/>
    <ellipse cx="780" cy="390" rx="76" ry="21" fill="none" stroke="#00ffaa" stroke-width="1.5" opacity="0.3"/>
    <text x="780" y="320" class="label" text-anchor="middle" font-size="18">💾 Vector Store</text>
    <text x="780" y="345" class="data-label" text-anchor="middle">ChromaDB / FAISS</text>
  </g>
  <rect x="55" y="400" width="700" height="100" fill="none" stroke="#00d9ff" stroke-width="1.5" opacity="0.3" rx="6"/>
  <text x="70" y="425" class="description" font-weight="600" font-size="14">💡 Benefits:</text>
  <text x="75" y="445" class="summary">• Done ONCE per document set → reusable for unlimited queries</text>
  <text x="75" y="463" class="summary">• Pre-computed embeddings → fast retrieval at query time</text>
  <text x="75" y="481" class="summary">• Scales efficiently → billions of vectors indexed</text>
  <rect x="830" y="70" width="740" height="760" fill="none" stroke="#0099ff" stroke-width="2.5" stroke-dasharray="8,4" rx="12" opacity="0.6"/>
  <text x="855" y="110" class="phase-title">[ONLINE PHASE]</text>
  <text x="855" y="132" class="phase-label">Query Processing &amp; Response Generation (Per Query)</text>
  <rect x="855" y="148" width="700" height="70" fill="none" stroke="#00ffaa" stroke-width="1.5" opacity="0.4" rx="6"/>
  <text x="870" y="170" class="summary" font-weight="600">📌 SUMMARY: Embed user query, find similar documents in vector store,</text>
  <text x="870" y="186" class="summary">inject top-K chunks into LLM prompt, generate contextual answer.</text>
  <text x="870" y="202" class="summary">Happens for EVERY user query in real-time.</text>
  <g filter="url(#glow)">
    <rect x="855" y="240" width="160" height="100" fill="none" stroke="#00d9ff" stroke-width="3" rx="10"/>
    <rect x="860" y="245" width="150" height="90" fill="none" stroke="#ff00ff" stroke-width="1.5" opacity="0.4" rx="8"/>
    <text x="935" y="280" class="label" text-anchor="middle" font-size="18">❓ Query</text>
    <text x="935" y="305" class="data-label" text-anchor="middle">User Input</text>
  </g>
  <line x1="1015" y1="290" x2="1070" y2="290" stroke="#00ffaa" stroke-width="3.5" marker-end="url(#arrowhead-cyan)"/>
  <rect x="1030" y="276" width="40" height="28" fill="#0a1628" opacity="0.95"/>
  <text x="1050" y="297" class="data-label" text-anchor="middle" font-size="12" font-weight="600">Embed</text>
  <g filter="url(#glow)">
    <rect x="1070" y="240" width="160" height="100" fill="none" stroke="#00d9ff" stroke-width="3" rx="10"/>
    <rect x="1075" y="245" width="150" height="90" fill="none" stroke="#aa00ff" stroke-width="1.5" opacity="0.4" rx="8"/>
    <text x="1150" y="275" class="label" text-anchor="middle" font-size="18">📊 Q Vector</text>
    <text x="1150" y="300" class="data-label" text-anchor="middle">Embedding</text>
    <text x="1150" y="318" class="data-label" text-anchor="middle">(384-dim)</text>
  </g>
  <path d="M 1230 290 Q 1260 340 900 400" stroke="#ff00ff" stroke-width="3.5" fill="none" marker-end="url(#arrowhead-purple)" stroke-dasharray="7,5"/>
  <rect x="1050" y="320" width="80" height="32" fill="#0a1628" opacity="0.95"/>
  <text x="1090" y="335" class="data-label" text-anchor="middle" font-size="12" font-weight="600">Similarity</text>
  <text x="1090" y="349" class="data-label" text-anchor="middle" font-size="12" font-weight="600">Search</text>
  <path d="M 860 390 Q 900 420 1010 450" stroke="#00d9ff" stroke-width="3.5" fill="none" marker-end="url(#arrowhead-green)"/>
  <rect x="920" y="400" width="70" height="32" fill="#0a1628" opacity="0.95"/>
  <text x="955" y="415" class="data-label" text-anchor="middle" font-size="12" font-weight="600">Top-K</text>
  <text x="955" y="429" class="data-label" text-anchor="middle" font-size="12" font-weight="600">Chunks</text>
  <g filter="url(#glow)">
    <rect x="1010" y="420" width="160" height="100" fill="none" stroke="#00d9ff" stroke-width="3" rx="10"/>
    <rect x="1015" y="425" width="150" height="90" fill="none" stroke="#00ffaa" stroke-width="1.5" opacity="0.4" rx="8"/>
    <text x="1090" y="460" class="label" text-anchor="middle" font-size="18">📋 Context</text>
    <text x="1090" y="485" class="data-label" text-anchor="middle">Top-K Chunks</text>
    <text x="1090" y="503" class="data-label" text-anchor="middle">(k=5)</text>
  </g>
  <line x1="1090" y1="520" x2="1090" y2="575" stroke="#00ffaa" stroke-width="3.5" marker-end="url(#arrowhead-cyan)"/>
  <rect x="1070" y="540" width="40" height="28" fill="#0a1628" opacity="0.95"/>
  <text x="1090" y="561" class="data-label" text-anchor="middle" font-size="12" font-weight="600">Augment</text>
  <g filter="url(#glow)">
    <rect x="1010" y="575" width="160" height="100" fill="none" stroke="#00d9ff" stroke-width="3" rx="10"/>
    <rect x="1015" y="580" width="150" height="90" fill="none" stroke="#ffaa00" stroke-width="1.5" opacity="0.4" rx="8"/>
    <text x="1090" y="615" class="label" text-anchor="middle" font-size="18">🤖 LLM</text>
    <text x="1090" y="640" class="data-label" text-anchor="middle">Generate Answer</text>
    <text x="1090" y="658" class="data-label" text-anchor="middle">(w/ Context)</text>
  </g>
  <line x1="1170" y1="625" x2="1225" y2="625" stroke="#00ffaa" stroke-width="3.5" marker-end="url(#arrowhead-cyan)"/>
  <rect x="1185" y="611" width="40" height="28" fill="#0a1628" opacity="0.95"/>
  <text x="1205" y="632" class="data-label" text-anchor="middle" font-size="12" font-weight="600">Output</text>
  <g filter="url(#glow)">
    <rect x="1225" y="575" width="160" height="100" fill="none" stroke="#00d9ff" stroke-width="3" rx="10"/>
    <rect x="1230" y="580" width="150" height="90" fill="none" stroke="#00ff00" stroke-width="1.5" opacity="0.4" rx="8"/>
    <text x="1305" y="615" class="label" text-anchor="middle" font-size="18">✅ Response</text>
    <text x="1305" y="640" class="data-label" text-anchor="middle">Generated Answer</text>
    <text x="1305" y="658" class="data-label" text-anchor="middle">+ References</text>
  </g>
  <rect x="855" y="710" width="700" height="100" fill="none" stroke="#00d9ff" stroke-width="1.5" opacity="0.3" rx="6"/>
  <text x="870" y="735" class="description" font-weight="600" font-size="14">💡 Key Operations:</text>
  <text x="875" y="755" class="summary">• Query embedding reuses same model → semantic similarity matching</text>
  <text x="875" y="773" class="summary">• Vector search → O(log n) complexity with indices (FAISS, HNSW)</text>
  <text x="875" y="791" class="summary">• Context injection → LLM grounds answer in retrieved documents</text>
  <g>
    <text x="55" y="850" class="phase-title">[LEGEND]</text>
    <line x1="250" y1="842" x2="295" y2="842" stroke="#00ffaa" stroke-width="3.5" marker-end="url(#arrowhead-cyan)"/>
    <text x="310" y="853" class="data-label" font-size="12" font-weight="600">Primary Data Flow</text>
    <line x1="600" y1="842" x2="645" y2="842" stroke="#ff00ff" stroke-width="3.5" stroke-dasharray="7,5" marker-end="url(#arrowhead-purple)"/>
    <text x="660" y="853" class="data-label" font-size="12" font-weight="600">Similarity Search</text>
    <line x1="1050" y1="842" x2="1095" y2="842" stroke="#00d9ff" stroke-width="3.5" marker-end="url(#arrowhead-green)"/>
    <text x="1110" y="853" class="data-label" font-size="12" font-weight="600">Retrieval Results</text>
  </g>
</svg>