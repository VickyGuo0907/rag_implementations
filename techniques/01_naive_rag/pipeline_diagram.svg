<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 800">
  <defs>
    <style>
      text { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
    </style>
    <marker id="arrowBlue" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#2563eb" />
    </marker>
    <marker id="arrowPurple" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#7c3aed" />
    </marker>
    <marker id="arrowGreen" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#059669" />
    </marker>
    <marker id="arrowOrange" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#ea580c" />
    </marker>
  </defs>
  <rect width="960" height="800" fill="#ffffff" />
  <text x="480" y="30" font-size="20" font-weight="bold" text-anchor="middle" fill="#000000">Naive RAG Pipeline - Code Flow</text>
  <!-- INDEXING PHASE -->
  <text x="50" y="70" font-size="14" font-weight="bold" fill="#1f2937">1. Indexing Phase</text>
  <path d="M 100,100 L 180,100 L 160,150 L 80,150 Z" fill="#e5e7eb" stroke="#4b5563" stroke-width="2" />
  <text x="120" y="130" font-size="13" text-anchor="middle" fill="#000000">Documents</text>
  <rect x="230" y="100" width="120" height="50" rx="8" fill="#dbeafe" stroke="#0284c7" stroke-width="2" />
  <text x="290" y="130" font-size="13" text-anchor="middle" fill="#000000">Text Splitter</text>
  <rect x="400" y="100" width="120" height="50" rx="8" fill="#f3e8ff" stroke="#7c3aed" stroke-width="2" />
  <text x="460" y="130" font-size="13" text-anchor="middle" fill="#000000">Embeddings</text>
  <ellipse cx="630" cy="115" rx="50" ry="15" fill="#dcfce7" stroke="#059669" stroke-width="2" />
  <rect x="580" y="115" width="100" height="35" fill="#dcfce7" stroke="#059669" stroke-width="2" />
  <ellipse cx="630" cy="150" rx="50" ry="15" fill="#bbf7d0" stroke="#059669" stroke-width="2" />
  <text x="630" y="132" font-size="13" text-anchor="middle" fill="#000000">Vector Store</text>
  <line x1="180" y1="125" x2="230" y2="125" stroke="#2563eb" stroke-width="2.5" marker-end="url(#arrowBlue)" />
  <rect x="197" y="112" width="28" height="16" fill="#ffffff" opacity="0.95" />
  <text x="211" y="124" font-size="11" text-anchor="middle" fill="#2563eb">text</text>
  <line x1="350" y1="125" x2="400" y2="125" stroke="#7c3aed" stroke-width="2.5" marker-end="url(#arrowPurple)" />
  <rect x="360" y="112" width="30" height="16" fill="#ffffff" opacity="0.95" />
  <text x="375" y="124" font-size="11" text-anchor="middle" fill="#7c3aed">chunks</text>
  <line x1="520" y1="125" x2="580" y2="125" stroke="#7c3aed" stroke-width="2.5" marker-end="url(#arrowPurple)" />
  <rect x="535" y="112" width="30" height="16" fill="#ffffff" opacity="0.95" />
  <text x="550" y="124" font-size="11" text-anchor="middle" fill="#7c3aed">embeds</text>
  <text x="630" y="180" font-size="11" text-anchor="middle" fill="#059669" font-style="italic">store()</text>
  <!-- QUERY PHASE -->
  <text x="50" y="270" font-size="14" font-weight="bold" fill="#1f2937">2. Query Phase</text>
  <path d="M 100,300 L 180,300 L 160,350 L 80,350 Z" fill="#fed7aa" stroke="#ea580c" stroke-width="2" />
  <text x="120" y="330" font-size="13" text-anchor="middle" fill="#000000">User Query</text>
  <rect x="230" y="300" width="120" height="50" rx="8" fill="#f3e8ff" stroke="#7c3aed" stroke-width="2" />
  <text x="290" y="330" font-size="13" text-anchor="middle" fill="#000000">Embed Query</text>
  <rect x="400" y="300" width="120" height="50" rx="8" fill="#c7f0d8" stroke="#059669" stroke-width="2" />
  <text x="460" y="330" font-size="13" text-anchor="middle" fill="#000000">Retriever</text>
  <text x="460" y="345" font-size="10" text-anchor="middle" fill="#059669">(top-k=5)</text>
  <rect x="570" y="300" width="120" height="50" rx="8" fill="#dbeafe" stroke="#0284c7" stroke-width="2" />
  <text x="630" y="330" font-size="13" text-anchor="middle" fill="#000000">Format Docs</text>
  <rect x="700" y="300" width="120" height="50" rx="8" fill="#dbeafe" stroke="#0284c7" stroke-width="2" />
  <text x="760" y="330" font-size="13" text-anchor="middle" fill="#000000">Prompt Template</text>
  <rect x="570" y="410" width="120" height="50" rx="8" fill="#fecaca" stroke="#dc2626" stroke-width="2" />
  <text x="630" y="440" font-size="13" text-anchor="middle" fill="#000000">LLM</text>
  <path d="M 720,410 L 800,410 L 780,460 L 700,460 Z" fill="#e5e7eb" stroke="#4b5563" stroke-width="2" />
  <text x="740" y="440" font-size="13" text-anchor="middle" fill="#000000">Answer</text>
  <line x1="180" y1="325" x2="230" y2="325" stroke="#ea580c" stroke-width="2.5" marker-end="url(#arrowOrange)" />
  <rect x="193" y="312" width="24" height="16" fill="#ffffff" opacity="0.95" />
  <text x="205" y="324" font-size="11" text-anchor="middle" fill="#ea580c">q</text>
  <line x1="350" y1="325" x2="400" y2="325" stroke="#7c3aed" stroke-width="2.5" marker-end="url(#arrowPurple)" />
  <rect x="360" y="312" width="30" height="16" fill="#ffffff" opacity="0.95" />
  <text x="375" y="324" font-size="11" text-anchor="middle" fill="#7c3aed">q_embed</text>
  <line x1="460" y1="300" x2="630" y2="180" stroke="#059669" stroke-width="2" stroke-dasharray="5,3" marker-end="url(#arrowGreen)" />
  <rect x="520" y="225" width="38" height="16" fill="#ffffff" opacity="0.95" />
  <text x="539" y="237" font-size="11" text-anchor="middle" fill="#059669">retrieve()</text>
  <line x1="520" y1="325" x2="570" y2="325" stroke="#059669" stroke-width="2.5" marker-end="url(#arrowGreen)" />
  <rect x="535" y="312" width="30" height="16" fill="#ffffff" opacity="0.95" />
  <text x="550" y="324" font-size="11" text-anchor="middle" fill="#059669">chunks</text>
  <line x1="690" y1="325" x2="700" y2="325" stroke="#2563eb" stroke-width="2.5" marker-end="url(#arrowBlue)" />
  <rect x="685" y="312" width="30" height="16" fill="#ffffff" opacity="0.95" />
  <text x="700" y="324" font-size="11" text-anchor="middle" fill="#2563eb">ctx</text>
  <path d="M 760,350 L 760,375 L 630,375 L 630,410" stroke="#2563eb" stroke-width="2.5" marker-end="url(#arrowBlue)" />
  <rect x="680" y="380" width="40" height="16" fill="#ffffff" opacity="0.95" />
  <text x="700" y="392" font-size="11" text-anchor="middle" fill="#2563eb">prompt</text>
  <line x1="690" y1="435" x2="700" y2="435" stroke="#2563eb" stroke-width="2.5" marker-end="url(#arrowBlue)" />
  <rect x="687" y="422" width="26" height="16" fill="#ffffff" opacity="0.95" />
  <text x="700" y="434" font-size="11" text-anchor="middle" fill="#2563eb">text</text>
  <!-- LEGEND -->
  <rect x="50" y="600" width="860" height="180" fill="#f9fafb" stroke="#d1d5db" stroke-width="1" rx="4" />
  <text x="60" y="620" font-size="13" font-weight="bold" fill="#000000">Arrow Types and Data Flow:</text>
  <line x1="60" y1="645" x2="100" y2="645" stroke="#2563eb" stroke-width="2.5" marker-end="url(#arrowBlue)" />
  <text x="110" y="650" font-size="12" fill="#000000">Primary Data (text, embeddings, context, response)</text>
  <line x1="60" y1="675" x2="100" y2="675" stroke="#7c3aed" stroke-width="2.5" marker-end="url(#arrowPurple)" />
  <text x="110" y="680" font-size="12" fill="#000000">Transformation (chunks, embeddings)</text>
  <line x1="60" y1="705" x2="100" y2="705" stroke="#059669" stroke-width="2.5" marker-end="url(#arrowGreen)" />
  <text x="110" y="710" font-size="12" fill="#000000">Memory Read (retrieval from vector store)</text>
  <line x1="60" y1="735" x2="100" y2="735" stroke="#ea580c" stroke-width="2.5" marker-end="url(#arrowOrange)" />
  <text x="110" y="740" font-size="12" fill="#000000">Control Flow (user query trigger)</text>
  <text x="60" y="765" font-size="11" fill="#6b7280" font-style="italic">Both LangChain and LlamaIndex implementations follow this pipeline. LlamaIndex uses VectorStoreIndex; LangChain builds LCEL chains.</text>
</svg>